<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIDAL | Bookmarklet</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: #1a1a1a;
            padding: 50px;
            border-radius: 30px;
            border: 1px solid #333;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            max-width: 400px;
        }
        h1 {
            color: #FF8C00;
            font-size: 3rem;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
        }
        p {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .install-btn {
            display: inline-block;
            background: #FF8C00;
            color: white;
            padding: 18px 30px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.4);
            cursor: move;
        }
        .install-btn:hover {
            transform: translateY(-3px) scale(1.05);
            background: #ffa533;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊TIDAL🌊</h1>
        <p>A specialized utility for Amplify Math. Drag the button below to your bookmarks bar to install.</p>
        
        <a class="install-btn" href="bmrk.js"
            Drag Me to Toolbar
        </a>

        <div class="footer">Site Lock Active</div>
    </div>
</body>
</html>
