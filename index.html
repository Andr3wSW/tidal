        :root {
            --primary: #FF8C00;
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
            --secondary: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: var(--card);
            border: 1px solid #333;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            letter-spacing: 6px;
            font-weight: 900;
            margin: 0 0 10px 0;
        }

        p {
            color: #bbb;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            font-size: 0.85rem;
        }

        /* Desktop Drag Button */
        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 140, 0, 0.4);
        }

        /* Mobile Copy Button */
        .btn-secondary {
            background-color: var(--secondary);
            color: #bbb;
        }

        .btn-secondary:hover {
            background-color: #444;
            color: white;
        }

        .instructions {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #666;
            text-align: left;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .instructions ol {
            padding-left: 20px;
            margin: 10px 0 0 0;
        }

        .instructions li {
            margin-bottom: 8px;
        }
    </style>
